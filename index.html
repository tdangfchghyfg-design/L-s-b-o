<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Panel</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#FFC0CB;color:#000;font-family:Arial;padding:10px;-webkit-user-select:none;user-select:none}.c{border:3px solid #FF1493;border-radius:12px;padding:15px;max-width:500px;margin:0 auto;background:#FFE4E9;color:#000}h1,h3{color:#C71585;text-align:center}h3{margin:15px 0 8px;border-bottom:1px solid #FF1493;padding-bottom:4px;text-align:left}.p{display:flex;flex-direction:column;gap:10px}.i{background:#FFB6C1;border:1px solid #FF1493;border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center}.l{font-size:14px;color:#8B0046;font-weight:bold}.s{font-size:11px;margin-top:2px}.s.on{color:#008000}.s.off{color:#C71585}.w{position:relative;width:46px;height:24px}.w input{opacity:0;width:0;height:0}.d{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#FFB6C1;border:1px solid #FF1493;transition:.3s;border-radius:24px}.d:before{position:absolute;content:"";height:18px;width:18px;left:2px;bottom:2px;background:#FF1493;transition:.3s;border-radius:50%}input:checked+.d{background:#FF1493}input:checked+.d:before{transform:translateX(22px);background:#fff}#log{margin-top:12px;padding:10px;background:#FFB6C1;border:1px solid #FF1493;border-radius:8px;height:150px;overflow-y:auto;font-size:11px;color:#8B0046}.b{width:100%;margin-top:8px;padding:8px;background:#FF1493;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer}.credit{font-size:12px;color:#C71585;text-align:center;padding:8px;background:#FFB6C1;border:1px solid #FF1493;border-radius:8px;margin-top:8px;font-weight:bold;pointer-events:none}.status{font-size:12px;text-align:center;padding:8px;background:#FFB6C1;border:1px solid #FF1493;border-radius:8px;margin-top:8px;font-weight:bold}.status .off{color:#C71585}.status .on{color:#008000}</style></head><body><div class="c"><h1>GAMEBOOTER</h1><div class="credit">ADMIN : LÊ BẢO</div><div class="status">HOẠT ĐỘNG: <span id="status" class="off">OFF</span></div><h3>HỖ TRỢ</h3><div class="p"><div class="i"><div><div class="l">FIX LAG</div><div class="s off" id="f0-s">Off</div></div><label class="w"><input type="checkbox" id="f0" onchange="t(0)"><span class="d"></span></label></div><div class="i"><div><div class="l">BOOSTER</div><div class="s off" id="f1-s">Off</div></div><label class="w"><input type="checkbox" id="f1" onchange="t(1)"><span class="d"></span></label></div><div class="i"><div><div class="l">FIX RUNG</div><div class="s off" id="f2-s">Off</div></div><label class="w"><input type="checkbox" id="f2" onchange="t(2)"><span class="d"></span></label></div></div><h3>DEVICE</h3><div class="p"><div class="i"><div><div class="l">QUÉT VIRUS</div><div class="s off" id="f3-s">Off</div></div><label class="w"><input type="checkbox" id="f3" onchange="t(3)"><span class="d"></span></label></div><div class="i"><div><div class="l">DỌN RÁC</div><div class="s off" id="f4-s">Off</div></div><label class="w"><input type="checkbox" id="f4" onchange="t(4)"><span class="d"></span></label></div><div class="i"><div><div class="l">TĂNG FPS</div><div class="s off" id="f5-s">Off</div></div><label class="w"><input type="checkbox" id="f5" onchange="t(5)"><span class="d"></span></label></div></div><button class="b" onclick="r()">RESET</button><div id="log"><div>> Ready...</div></div></div><script>const n=['FIX LAG','BOOSTER','FIX RUNG','QUÉT VIRUS','DỌN RÁC','TĂNG FPS'],l=[['Quét app ngầm','Dọn RAM','Tối ưu CPU','Done'],['High Performance','Tăng quạt','Ưu tiên mạng','Done'],['Ổn định gyroscope','Giảm độ trễ cảm biến','Khóa tâm','Done'],['Quét C:','Quét D:','0 virus','Done'],['Xóa temp','Xóa cache','Dọn rác','Done'],['Tắt hiệu ứng','Ưu tiên GPU','Khóa 144FPS','Done']];function u(){let on=0;for(let i=0;i<6;i++)if(document.getElementById('f'+i).checked)on++;const st=document.getElementById('status');if(on>0){st.textContent='ON';st.className='on'}else{st.textContent='OFF';st.className='off'}}function t(i){const c=document.getElementById('f'+i),s=document.getElementById('f'+i+'-s'),g=document.getElementById('log');if(c.checked){s.textContent='On';s.className='s on';g.innerHTML+=`<div>> ${n[i]}</div>`;l[i].forEach(e=>g.innerHTML+=`<div>> ${e}</div>`)}else{s.textContent='Off';s.className='s off';g.innerHTML+=`<div>> Tắt ${n[i]}</div>`}u();g.scrollTop=g.scrollHeight}function r(){for(let i=0;i<6;i++){document.getElementById('f'+i).checked=!1;t(i)}document.getElementById('log').innerHTML='<div>> Reset...</div>';u()}document.oncontextmenu=e=>e.preventDefault();document.addEventListener('selectstart',e=>e.preventDefault());u();</script></body></html>
